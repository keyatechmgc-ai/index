<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mahmoud & Eman | افتح الظرف</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,400;1,500;1,600;1,700;1,800;1,900&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&family=Great+Vibes&family=Dancing+Script:wght@400;500;600;700&family=Tajawal:wght@400;500;700;800;900&family=El+Messiri:wght@400;500;600;700&family=Montserrat:wght@300;400;500;600;700;800&family=Raleway:wght@300;400;500;600;700;800&family=Changa:wght@400;500;600;700;800&family=Almarai:wght@400;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --pink: #e8a0b4;
            --pink-light: #f2c8d4;
            --pink-dark: #c47d8b;
            --pink-soft: #f9e4ea;
            --pink-pale: #fdf5f7;
            --pink-medium: #e8b4c4;
            --white: #ffffff;
            --dark: #3d2c30;
            --dark-soft: #5c4549;
            --gold: #c9a87c;
            --gold-light: #e8d9c5;
            --gold-dark: #b8946a;
            --cream: #fdf8f5;
            --shadow-envelope: 0 40px 100px rgba(60, 44, 48, 0.2), 0 15px 40px rgba(196,125,139,0.15);
            --shadow-flap: 0 15px 50px rgba(60, 44, 48, 0.25);
            --shadow-seal: 0 10px 35px rgba(196,125,139,0.5), inset 0 3px 0 rgba(255,255,255,0.3);
            --gradient-envelope: linear-gradient(165deg, #fdf5f7 0%, #f9e4ea 25%, #f2c8d4 50%, #f5d5de 75%, #fdf5f7 100%);
            --gradient-flap: linear-gradient(170deg, #f9e4ea 0%, #f2c8d4 20%, #e8b4c4 50%, #e8a0b4 80%, #f2c8d4 100%);
            --gradient-seal: linear-gradient(135deg, #c9a87c 0%, #e8d9c5 30%, #c9a87c 60%, #b8946a 100%);
            --gradient-gold-trim: linear-gradient(180deg, #e8d9c5 0%, #c9a87c 50%, #b8946a 100%);
            --names-font: 'Cormorant Garamond', serif;
            --main-font: 'Cairo', sans-serif;
            --script-font: 'Great Vibes', cursive;
            --ai-transition: cubic-bezier(0.25, 0.1, 0.25, 1);
            --ai-bounce: cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: var(--main-font);
            min-height: 100vh;
            min-height: 100dvh;
            overflow: hidden;
            position: relative;
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #3d2c30;
        }

        /* ============ FLORAL BACKGROUND ============ */
        .floral-bg-wrapper {
            position: fixed;
            inset: 0;
            z-index: 0;
            overflow: hidden;
        }

        .floral-bg-image {
            position: absolute;
            inset: -5%;
            width: 110%;
            height: 110%;
            object-fit: cover;
            z-index: 0;
        }

        .floral-bg-overlay {
            position: absolute;
            inset: 0;
            z-index: 1;
            background: 
                radial-gradient(ellipse at center, rgba(255,245,247,0.3) 0%, rgba(255,245,247,0.6) 40%, rgba(196,125,139,0.5) 80%, rgba(60,44,48,0.8) 100%);
        }

        .floral-bg-vignette {
            position: absolute;
            inset: 0;
            z-index: 2;
            background: radial-gradient(ellipse at center, transparent 50%, rgba(60,44,48,0.7) 100%);
            pointer-events: none;
        }

        /* ============ AI PARTICLES & SPARKLES ============ */
        #aiParticlesCanvas {
            position: fixed;
            inset: 0;
            z-index: 5;
            pointer-events: none;
            opacity: 0.8;
        }

        .ai-sparkle {
            position: fixed;
            pointer-events: none;
            z-index: 6;
            animation: sparkleAnimation var(--sparkle-duration) ease-out forwards;
            animation-delay: var(--sparkle-delay);
        }

        @keyframes sparkleAnimation {
            0% {
                transform: translate(0, 0) scale(1) rotate(0deg);
                opacity: 1;
            }
            50% {
                opacity: 0.8;
            }
            100% {
                transform: translate(var(--sparkle-tx), var(--sparkle-ty)) scale(0) rotate(var(--sparkle-rot));
                opacity: 0;
            }
        }

        /* ============ GOLDEN FLOATING PARTICLES ============ */
        .golden-particle {
            position: fixed;
            pointer-events: none;
            z-index: 7;
            animation: goldenFloat var(--particle-duration) ease-in-out infinite;
            animation-delay: var(--particle-delay);
        }

        @keyframes goldenFloat {
            0%, 100% {
                transform: translateY(0) translateX(0) rotate(0deg);
                opacity: 0.3;
            }
            25% {
                transform: translateY(-40px) translateX(15px) rotate(90deg);
                opacity: 0.7;
            }
            50% {
                transform: translateY(-80px) translateX(-10px) rotate(180deg);
                opacity: 0.5;
            }
            75% {
                transform: translateY(-40px) translateX(-20px) rotate(270deg);
                opacity: 0.6;
            }
        }

        /* ============ MAIN ENVELOPE CONTAINER ============ */
        .envelope-stage {
            position: relative;
            z-index: 10;
            perspective: 1500px;
            perspective-origin: 50% 50%;
        }

        /* ============ ENVELOPE SHADOW ============ */
        .envelope-floor-shadow {
            position: absolute;
            bottom: -50px;
            left: 50%;
            transform: translateX(-50%);
            width: 110%;
            height: 60px;
            background: radial-gradient(ellipse, rgba(0,0,0,0.4) 0%, rgba(0,0,0,0.2) 40%, transparent 70%);
            border-radius: 50%;
            z-index: 0;
            animation: shadowPulse 4s ease-in-out infinite;
        }

        @keyframes shadowPulse {
            0%, 100% { transform: translateX(-50%) scaleX(1); opacity: 0.8; }
            50% { transform: translateX(-50%) scaleX(1.1); opacity: 0.95; }
        }

        /* ============ FLORAL DECORATIONS AROUND ENVELOPE ============ */
        .floral-decor {
            position: absolute;
            pointer-events: none;
            z-index: 11;
        }

        .floral-decor-top {
            top: -70px;
            left: 50%;
            transform: translateX(-50%);
            animation: floralSwayTop 5s ease-in-out infinite;
        }

        @keyframes floralSwayTop {
            0%, 100% { transform: translateX(-50%) rotate(0deg); }
            25% { transform: translateX(calc(-50% + 8px)) rotate(3deg); }
            75% { transform: translateX(calc(-50% - 8px)) rotate(-3deg); }
        }

        .floral-decor-left {
            top: 30%;
            left: -65px;
            animation: floralSwayLeft 6s ease-in-out infinite;
        }

        @keyframes floralSwayLeft {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-12px) rotate(5deg); }
        }

        .floral-decor-right {
            top: 30%;
            right: -65px;
            animation: floralSwayRight 6s ease-in-out infinite;
            animation-delay: 1s;
        }

        @keyframes floralSwayRight {
            0%, 100% { transform: translateY(0) rotate(0deg) scaleX(-1); }
            50% { transform: translateY(-12px) rotate(-5deg) scaleX(-1); }
        }

        .floral-decor-bottom {
            bottom: -55px;
            left: 50%;
            transform: translateX(-50%);
            animation: floralSwayBottom 5.5s ease-in-out infinite;
            animation-delay: 0.5s;
        }

        @keyframes floralSwayBottom {
            0%, 100% { transform: translateX(-50%) rotate(0deg); }
            33% { transform: translateX(calc(-50% + 6px)) rotate(2deg); }
            66% { transform: translateX(calc(-50% - 6px)) rotate(-2deg); }
        }

        /* ============ 3D ENVELOPE ============ */
        .envelope-3d-container {
            position: relative;
            width: 380px;
            width: min(85vw, 400px);
            height: 270px;
            height: min(42vh, 290px);
            transform-style: preserve-3d;
            cursor: pointer;
            z-index: 10;
        }

        /* Envelope Back Panel */
        .envelope-back-panel {
            position: absolute;
            inset: 0;
            background: var(--gradient-envelope);
            border-radius: 20px;
            transform: translateZ(-15px);
            box-shadow: var(--shadow-envelope);
            z-index: 0;
            border: 2px solid rgba(196,125,139,0.12);
        }

        /* Envelope Back panel inner texture */
        .envelope-back-panel::after {
            content: '';
            position: absolute;
            inset: 8px;
            border: 1.5px solid rgba(196,125,139,0.08);
            border-radius: 14px;
            pointer-events: none;
        }

        /* Envelope Body (Bottom Part) */
        .envelope-body-lower {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 58%;
            background: linear-gradient(180deg, 
                rgba(255,255,255,0.9) 0%, 
                rgba(253,245,247,0.85) 20%, 
                rgba(249,228,234,0.8) 50%, 
                rgba(242,200,212,0.75) 100%);
            border-radius: 0 0 20px 20px;
            transform: translateZ(2px);
            box-shadow: 0 10px 35px rgba(60,44,48,0.12);
            z-index: 2;
            border: 1.5px solid rgba(196,125,139,0.1);
            border-top: none;
            overflow: hidden;
            backdrop-filter: blur(2px);
        }

        /* Envelope V-cut */
        .envelope-vcut {
            position: absolute;
            top: -1px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 38px solid transparent;
            border-right: 38px solid transparent;
            border-top: 30px solid rgba(249,228,234,0.85);
            z-index: 3;
            filter: drop-shadow(0 3px 6px rgba(0,0,0,0.06));
        }

        /* Gold Trim on V-cut */
        .envelope-vcut-gold {
            position: absolute;
            top: -1px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 40px solid transparent;
            border-right: 40px solid transparent;
            border-top: 32px solid rgba(201,168,124,0.3);
            z-index: 2;
            pointer-events: none;
        }

        /* Envelope body decorative pattern */
        .envelope-body-pattern {
            position: absolute;
            inset: 15px;
            border: 1.5px dashed rgba(196,125,139,0.15);
            border-radius: 12px;
            pointer-events: none;
            z-index: 1;
        }

        .envelope-body-pattern::before {
            content: '';
            position: absolute;
            inset: 5px;
            border: 1px dotted rgba(201,168,124,0.12);
            border-radius: 8px;
        }

        /* Envelope Flap */
        .envelope-flap-royal {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 57%;
            background: var(--gradient-flap);
            border-radius: 20px 20px 55% 55%;
            transform-origin: top center;
            transform: translateZ(8px);
            transition: transform 0.9s var(--ai-bounce);
            box-shadow: var(--shadow-flap);
            z-index: 6;
            cursor: grab;
            touch-action: none;
            overflow: hidden;
        }

        .envelope-flap-royal:active {
            cursor: grabbing;
        }

        .envelope-flap-royal.opened {
            transform: rotateX(-178deg) translateZ(8px);
            border-radius: 20px 20px 0 0;
            box-shadow: 0 25px 60px rgba(60,44,48,0.3);
        }

        /* Flap inner texture */
        .envelope-flap-royal::before {
            content: '';
            position: absolute;
            inset: 12px;
            border: 1.5px solid rgba(255,255,255,0.35);
            border-radius: 14px 14px 45% 45%;
            pointer-events: none;
        }

        .envelope-flap-royal::after {
            content: '';
            position: absolute;
            inset: 22px;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 10px 10px 38% 38%;
            pointer-events: none;
        }

        /* Gold trim on flap edge */
        .flap-gold-trim {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: var(--gradient-gold-trim);
            z-index: 7;
            pointer-events: none;
            opacity: 0.7;
        }

        /* ============ LETTER INSIDE ============ */
        .letter-inside-envelope {
            position: absolute;
            left: 18px;
            right: 18px;
            top: 34%;
            height: 50%;
            background: linear-gradient(180deg, #ffffff 0%, #fefcfb 50%, #fdf8f7 100%);
            border-radius: 12px;
            z-index: 1;
            transition: transform 0.9s var(--ai-bounce);
            box-shadow: 0 8px 30px rgba(60,44,48,0.12);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transform: translateZ(0);
            border: 1px solid rgba(196,125,139,0.08);
            overflow: hidden;
        }

        .letter-inside-envelope.revealed {
            transform: translateY(-38%) translateZ(0);
            box-shadow: 0 18px 50px rgba(60,44,48,0.2);
        }

        /* Letter subtle texture */
        .letter-inside-envelope::before {
            content: '';
            position: absolute;
            inset: 0;
            background: 
                repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(196,125,139,0.02) 3px, rgba(196,125,139,0.02) 4px);
            pointer-events: none;
        }

        /* Letter gold border */
        .letter-inside-envelope::after {
            content: '';
            position: absolute;
            inset: 6px;
            border: 0.5px solid rgba(201,168,124,0.25);
            border-radius: 8px;
            pointer-events: none;
        }

        .letter-content-wrapper {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 20px;
        }

        .letter-names-display {
            font-family: var(--names-font);
            font-size: 2.2rem;
            font-weight: 500;
            color: var(--pink-dark);
            letter-spacing: 4px;
            line-height: 1.2;
            margin-bottom: 4px;
        }

        .letter-and-display {
            display: block;
            font-family: var(--script-font);
            font-size: 1.6rem;
            color: var(--gold-dark);
            margin: 4px 0 8px;
            line-height: 1;
        }

        .letter-date-display {
            display: block;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.6rem;
            color: #ccc;
            letter-spacing: 6px;
            text-transform: uppercase;
            margin-top: 6px;
        }

        .letter-tap-hint {
            display: inline-block;
            font-family: var(--main-font);
            font-size: 0.55rem;
            color: #ccc;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-top: 8px;
            animation: tapHintPulse 2.5s ease-in-out infinite;
        }

        @keyframes tapHintPulse {
            0%, 100% { opacity: 0.25; }
            50% { opacity: 0.8; }
        }

        /* ============ ROYAL WAX SEAL ============ */
        .royal-wax-seal {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) translateZ(15px);
            width: 75px;
            height: 75px;
            border-radius: 50%;
            background: var(--gradient-seal);
            z-index: 8;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: var(--shadow-seal);
            transition: all 0.7s var(--ai-bounce);
            pointer-events: none;
        }

        .royal-wax-seal.hidden {
            opacity: 0;
            transform: translate(-50%, -50%) translateZ(15px) scale(0) rotate(225deg);
        }

        .seal-outer-ring {
            width: 58px;
            height: 58px;
            border-radius: 50%;
            border: 2.5px solid rgba(255,255,255,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .seal-inner-ring {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: 1.5px solid rgba(255,255,255,0.4);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .seal-monogram {
            font-family: var(--names-font);
            font-size: 1.3rem;
            color: white;
            font-weight: 700;
            letter-spacing: 2px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.15);
        }

        /* ============ HINT TEXT ============ */
        .envelope-instruction {
            position: absolute;
            bottom: -65px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.9);
            font-size: 0.75rem;
            letter-spacing: 5px;
            font-weight: 500;
            animation: instructionFloat 3s ease-in-out infinite;
            white-space: nowrap;
            z-index: 20;
            text-align: center;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }

        @keyframes instructionFloat {
            0%, 100% { opacity: 0.5; transform: translateX(-50%) translateY(0); }
            50% { opacity: 1; transform: translateX(-50%) translateY(8px); }
        }

        /* ============ MOBILE ============ */
        @media screen and (max-width: 480px) {
            .envelope-3d-container {
                width: 85vw;
                height: 35vh;
                max-height: 240px;
            }
            .letter-names-display {
                font-size: 1.6rem;
                letter-spacing: 3px;
            }
            .letter-and-display {
                font-size: 1.3rem;
            }
            .royal-wax-seal {
                width: 60px;
                height: 60px;
            }
            .seal-outer-ring {
                width: 46px;
                height: 46px;
            }
            .seal-inner-ring {
                width: 34px;
                height: 34px;
            }
            .seal-monogram {
                font-size: 1rem;
            }
            .floral-decor-top svg,
            .floral-decor-bottom svg {
                width: 100px;
            }
            .floral-decor-left svg,
            .floral-decor-right svg {
                width: 60px;
            }
            .floral-decor-left {
                left: -30px;
            }
            .floral-decor-right {
                right: -30px;
            }
            .envelope-instruction {
                font-size: 0.65rem;
                letter-spacing: 3px;
                bottom: -55px;
            }
        }

        @media screen and (max-width: 360px) {
            .envelope-3d-container {
                height: 32vh;
            }
            .letter-names-display {
                font-size: 1.4rem;
            }
        }

        @supports (-webkit-touch-callout: none) {
            body {
                min-height: -webkit-fill-available;
            }
        }
    </style>
</head>
<body>

    <!-- Floral Background -->
    <div class="floral-bg-wrapper">
        <img class="floral-bg-image" src="https://i.pinimg.com/736x/47/aa/57/47aa57cabff46306447e777ac52e8a8e.jpg" alt="Floral Background" crossorigin="anonymous">
        <div class="floral-bg-overlay"></div>
        <div class="floral-bg-vignette"></div>
    </div>

    <!-- AI Particles Canvas -->
    <canvas id="aiParticlesCanvas"></canvas>

    <!-- Golden Floating Particles Container -->
    <div id="goldenParticlesContainer" style="position:fixed;inset:0;pointer-events:none;z-index:7;"></div>

    <!-- Envelope Stage -->
    <div class="envelope-stage" id="envelopeStage">
        
        <!-- Envelope Shadow -->
        <div class="envelope-floor-shadow"></div>
        
        <!-- Floral Decorations -->
        <div class="floral-decor floral-decor-top">
            <svg width="140" height="80" viewBox="0 0 140 80" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <linearGradient id="fdTopGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                        <stop offset="0%" style="stop-color:#f2c8d4;stop-opacity:0.9"/>
                        <stop offset="100%" style="stop-color:#e8a0b4;stop-opacity:0.6"/>
                    </linearGradient>
                </defs>
                <g fill="url(#fdTopGrad)">
                    <circle cx="70" cy="30" r="18"/>
                    <circle cx="45" cy="45" r="14"/>
                    <circle cx="95" cy="45" r="14"/>
                    <circle cx="30" cy="55" r="10"/>
                    <circle cx="110" cy="55" r="10"/>
                    <circle cx="70" cy="60" r="12"/>
                    <circle cx="55" cy="35" r="8"/>
                    <circle cx="85" cy="35" r="8"/>
                </g>
                <g stroke="#e8a0b4" stroke-width="1" fill="none" opacity="0.5">
                    <path d="M70,30 Q55,35 45,45 Q55,40 70,60 Q85,40 95,45 Q85,35 70,30Z"/>
                    <path d="M45,45 Q38,50 30,55 Q40,52 55,35"/>
                    <path d="M95,45 Q102,50 110,55 Q100,52 85,35"/>
                </g>
            </svg>
        </div>
        
        <div class="floral-decor floral-decor-left">
            <svg width="80" height="180" viewBox="0 0 80 180" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <linearGradient id="fdLeftGrad" x1="100%" y1="0%" x2="0%" y2="100%">
                        <stop offset="0%" style="stop-color:#f2c8d4;stop-opacity:0.8"/>
                        <stop offset="100%" style="stop-color:#e8a0b4;stop-opacity:0.5"/>
                    </linearGradient>
                </defs>
                <g fill="url(#fdLeftGrad)">
                    <circle cx="40" cy="30" r="16"/><circle cx="25" cy="65" r="12"/>
                    <circle cx="55" cy="70" r="13"/><circle cx="20" cy="100" r="10"/>
                    <circle cx="50" cy="105" r="11"/><circle cx="35" cy="135" r="14"/>
                    <circle cx="55" cy="150" r="10"/><circle cx="25" cy="160" r="9"/>
                </g>
                <g stroke="#e8a0b4" stroke-width="0.8" fill="none" opacity="0.4">
                    <path d="M40,30 Q30,45 25,65 Q35,55 40,30"/>
                    <path d="M55,70 Q45,85 50,105 Q55,90 55,70"/>
                    <path d="M35,135 Q40,145 55,150 Q45,145 35,135"/>
                </g>
            </svg>
        </div>
        
        <div class="floral-decor floral-decor-right">
            <svg width="80" height="180" viewBox="0 0 80 180" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <linearGradient id="fdRightGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:#f2c8d4;stop-opacity:0.8"/>
                        <stop offset="100%" style="stop-color:#e8a0b4;stop-opacity:0.5"/>
                    </linearGradient>
                </defs>
                <g fill="url(#fdRightGrad)">
                    <circle cx="40" cy="30" r="16"/><circle cx="55" cy="65" r="12"/>
                    <circle cx="25" cy="70" r="13"/><circle cx="60" cy="100" r="10"/>
                    <circle cx="30" cy="105" r="11"/><circle cx="45" cy="135" r="14"/>
                    <circle cx="25" cy="150" r="10"/><circle cx="55" cy="160" r="9"/>
                </g>
                <g stroke="#e8a0b4" stroke-width="0.8" fill="none" opacity="0.4">
                    <path d="M40,30 Q50,45 55,65 Q45,55 40,30"/>
                    <path d="M25,70 Q35,85 30,105 Q25,90 25,70"/>
                    <path d="M45,135 Q40,145 25,150 Q35,145 45,135"/>
                </g>
            </svg>
        </div>
        
        <div class="floral-decor floral-decor-bottom">
            <svg width="140" height="70" viewBox="0 0 140 70" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <linearGradient id="fdBottomGrad" x1="0%" y1="100%" x2="0%" y2="0%">
                        <stop offset="0%" style="stop-color:#f2c8d4;stop-opacity:0.9"/>
                        <stop offset="100%" style="stop-color:#e8a0b4;stop-opacity:0.6"/>
                    </linearGradient>
                </defs>
                <g fill="url(#fdBottomGrad)">
                    <circle cx="70" cy="25" r="14"/><circle cx="45" cy="15" r="10"/>
                    <circle cx="95" cy="15" r="10"/><circle cx="30" cy="10" r="8"/>
                    <circle cx="110" cy="10" r="8"/><circle cx="70" cy="8" r="10"/>
                    <circle cx="55" cy="20" r="7"/><circle cx="85" cy="20" r="7"/>
                </g>
                <g stroke="#e8a0b4" stroke-width="1" fill="none" opacity="0.5">
                    <path d="M70,25 Q55,20 45,15 Q55,18 70,8 Q85,18 95,15 Q85,20 70,25Z"/>
                </g>
            </svg>
        </div>

        <!-- 3D Envelope -->
        <div class="envelope-3d-container" id="envelope3DContainer">
            
            <!-- Back Panel -->
            <div class="envelope-back-panel"></div>
            
            <!-- Body Lower -->
            <div class="envelope-body-lower">
                <div class="envelope-body-pattern"></div>
            </div>
            
            <!-- V-cut Gold Trim -->
            <div class="envelope-vcut-gold"></div>
            
            <!-- V-cut -->
            <div class="envelope-vcut"></div>
            
            <!-- Letter Inside -->
            <div class="letter-inside-envelope" id="letterInside">
                <div class="letter-content-wrapper">
                    <div class="letter-names-display">
                        <span id="letterGroom">mahmoud</span>
                        <span class="letter-and-display">&</span>
                        <span id="letterBride">eman</span>
                    </div>
                    <span class="letter-date-display" id="letterDate">08 . 08 . 2026</span>
                    <span class="letter-tap-hint">اضغط للمتابعة</span>
                </div>
            </div>
            
            <!-- Flap -->
            <div class="envelope-flap-royal" id="envelopeFlapRoyal">
                <div class="flap-gold-trim"></div>
            </div>
            
            <!-- Royal Wax Seal -->
            <div class="royal-wax-seal" id="royalWaxSeal">
                <div class="seal-outer-ring">
                    <div class="seal-inner-ring">
                        <span class="seal-monogram">M&E</span>
                    </div>
                </div>
            </div>
            
        </div>
        
        <!-- Instruction -->
        <div class="envelope-instruction" id="envelopeInstruction">
            اسحب الطرف الذهبي للأعلى لفتح الظرف
        </div>
        
    </div>

    <script>
        // ============ GLOBAL STATE ============
        let flapOpen = false;
        let isAnimating = false;

        // ============ AI PARTICLES SYSTEM ============
        function initAIParticles() {
            const canvas = document.getElementById('aiParticlesCanvas');
            const ctx = canvas.getContext('2d');
            
            function resize() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            resize();
            window.addEventListener('resize', resize);

            const particles = [];
            const particleCount = 80;

            class AIParticle {
                constructor() {
                    this.init();
                }
                init() {
                    this.x = Math.random() * canvas.width;
                    this.y = Math.random() * canvas.height;
                    this.size = Math.random() * 3 + 0.5;
                    this.speedX = (Math.random() - 0.5) * 0.3;
                    this.speedY = (Math.random() - 0.5) * 0.2;
                    this.opacity = Math.random() * 0.4 + 0.05;
                    this.color = Math.random() > 0.5 ? 'rgba(232,160,180,' : 'rgba(201,168,124,';
                    this.phase = Math.random() * Math.PI * 2;
                    this.oscSpeed = Math.random() * 0.01 + 0.003;
                    this.connectionRadius = 100;
                }
                update() {
                    this.phase += this.oscSpeed;
                    this.x += this.speedX + Math.sin(this.phase) * 0.2;
                    this.y += this.speedY + Math.cos(this.phase) * 0.15;
                    
                    if (this.x < -40) this.x = canvas.width + 40;
                    if (this.x > canvas.width + 40) this.x = -40;
                    if (this.y < -40) this.y = canvas.height + 40;
                    if (this.y > canvas.height + 40) this.y = -40;
                }
                draw(ctx) {
                    ctx.save();
                    const alpha = this.opacity + Math.sin(this.phase) * 0.1;
                    ctx.globalAlpha = alpha;
                    ctx.fillStyle = this.color + alpha + ')';
                    ctx.shadowBlur = 12;
                    ctx.shadowColor = this.color + '0.6)';
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.restore();
                }
            }

            for (let i = 0; i < particleCount; i++) {
                particles.push(new AIParticle());
            }

            function drawConnections() {
                for (let i = 0; i < particles.length; i++) {
                    for (let j = i + 1; j < particles.length; j++) {
                        const dx = particles[i].x - particles[j].x;
                        const dy = particles[i].y - particles[j].y;
                        const distance = Math.sqrt(dx * dx + dy * dy);

                        if (distance < 90) {
                            const alpha = (1 - distance / 90) * 0.08;
                            ctx.save();
                            ctx.globalAlpha = alpha;
                            ctx.strokeStyle = particles[i].color + alpha + ')';
                            ctx.lineWidth = 0.3;
                            ctx.beginPath();
                            ctx.moveTo(particles[i].x, particles[i].y);
                            ctx.lineTo(particles[j].x, particles[j].y);
                            ctx.stroke();
                            ctx.restore();
                        }
                    }
                }
            }

            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                particles.forEach(p => {
                    p.update();
                    p.draw(ctx);
                });
                drawConnections();
                requestAnimationFrame(animate);
            }

            animate();
        }

        // ============ AI GOLDEN FLOATING PARTICLES ============
        function initGoldenParticles() {
            const container = document.getElementById('goldenParticlesContainer');
            
            function createGoldenParticle() {
                const particle = document.createElement('div');
                particle.className = 'golden-particle';
                
                const size = Math.random() * 4 + 2;
                const x = Math.random() * 100;
                const y = Math.random() * 100;
                const duration = Math.random() * 6 + 6;
                const delay = Math.random() * 4;
                
                particle.style.cssText = `
                    left: ${x}%;
                    top: ${y}%;
                    width: ${size}px;
                    height: ${size}px;
                    background: radial-gradient(circle, rgba(232,217,197,0.9) 0%, rgba(201,168,124,0.5) 100%);
                    border-radius: 50%;
                    --particle-duration: ${duration}s;
                    --particle-delay: ${delay}s;
                    box-shadow: 0 0 ${size * 3}px rgba(232,217,197,0.6);
                `;
                
                container.appendChild(particle);
                
                setTimeout(() => {
                    particle.remove();
                }, (duration + delay) * 1000 + 500);
            }
            
            // Initial burst
            for (let i = 0; i < 15; i++) {
                setTimeout(createGoldenParticle, i * 200);
            }
            
            // Continuous creation
            setInterval(() => {
                createGoldenParticle();
            }, 1500);
        }

        // ============ AI SPARKLES ============
        function createSparkle(x, y) {
            const sparkle = document.createElement('div');
            sparkle.className = 'ai-sparkle';
            
            const size = Math.random() * 6 + 3;
            const tx = (Math.random() - 0.5) * 80;
            const ty = (Math.random() - 0.5) * 80 - 20;
            const rot = (Math.random() - 0.5) * 180;
            const duration = Math.random() * 1.5 + 1;
            
            sparkle.style.cssText = `
                left: ${x}px;
                top: ${y}px;
                width: ${size}px;
                height: ${size}px;
                background: radial-gradient(circle, rgba(255,255,255,0.9) 0%, rgba(232,217,197,0.7) 100%);
                border-radius: 50%;
                --sparkle-duration: ${duration}s;
                --sparkle-delay: 0s;
                --sparkle-tx: ${tx}px;
                --sparkle-ty: ${ty}px;
                --sparkle-rot: ${rot}deg;
                box-shadow: 0 0 ${size * 2}px rgba(255,255,255,0.8), 0 0 ${size * 4}px rgba(232,217,197,0.5);
                pointer-events: none;
            `;
            
            document.body.appendChild(sparkle);
            
            setTimeout(() => {
                sparkle.remove();
            }, duration * 1000 + 200);
        }

        // ============ ENVELOPE INTERACTION ============
        function initEnvelopeInteraction() {
            const flap = document.getElementById('envelopeFlapRoyal');
            const letter = document.getElementById('letterInside');
            const seal = document.getElementById('royalWaxSeal');
            const instruction = document.getElementById('envelopeInstruction');
            const container = document.getElementById('envelope3DContainer');
            
            let startY = 0;
            let currentRotation = 0;
            const maxOpen = -178;
            
            function openFlap() {
                if (isAnimating || flapOpen) return;
                isAnimating = true;
                flapOpen = true;
                flap.classList.add('opened');
                letter.classList.add('revealed');
                seal.classList.add('hidden');
                instruction.textContent = 'اضغط على الرسالة للمتابعة';
                
                // Sparkle burst on open
                const rect = container.getBoundingClientRect();
                const centerX = rect.left + rect.width / 2;
                const centerY = rect.top + rect.height / 2;
                for (let i = 0; i < 12; i++) {
                    setTimeout(() => {
                        createSparkle(centerX + (Math.random() - 0.5) * 200, centerY + (Math.random() - 0.5) * 150);
                    }, i * 50);
                }
                
                setTimeout(() => { isAnimating = false; }, 900);
            }
            
            function closeFlap() {
                if (isAnimating || !flapOpen) return;
                isAnimating = true;
                flapOpen = false;
                flap.classList.remove('opened');
                letter.classList.remove('revealed');
                seal.classList.remove('hidden');
                instruction.textContent = 'اسحب الطرف الذهبي للأعلى لفتح الظرف';
                
                setTimeout(() => { isAnimating = false; }, 900);
            }
            
            // Touch Events
            flap.addEventListener('touchstart', (e) => {
                startY = e.touches[0].clientY;
                flap.style.transition = 'none';
                
                // Sparkles on touch
                const touch = e.touches[0];
                createSparkle(touch.clientX, touch.clientY);
            }, { passive: true });
            
            flap.addEventListener('touchmove', (e) => {
                const diff = startY - e.touches[0].clientY;
                const rotation = Math.max(maxOpen, Math.min(0, -diff * 1.5));
                flap.style.transform = `rotateX(${rotation}deg) translateZ(8px)`;
                currentRotation = rotation;
                
                if (rotation < -85) {
                    letter.classList.add('revealed');
                    seal.classList.add('hidden');
                } else {
                    letter.classList.remove('revealed');
                    seal.classList.remove('hidden');
                }
                
                // Sparkles during drag
                if (Math.random() > 0.7) {
                    createSparkle(e.touches[0].clientX, e.touches[0].clientY);
                }
            }, { passive: true });
            
            flap.addEventListener('touchend', () => {
                flap.style.transition = 'transform 0.9s cubic-bezier(0.34, 1.56, 0.64, 1)';
                
                if (currentRotation < -65) {
                    openFlap();
                } else {
                    closeFlap();
                }
                currentRotation = 0;
            });
            
            // Mouse Events
            flap.addEventListener('mousedown', (e) => {
                startY = e.clientY;
                flap.style.transition = 'none';
                createSparkle(e.clientX, e.clientY);
                document.addEventListener('mousemove', onMouseMove);
                document.addEventListener('mouseup', onMouseUp);
            });
            
            function onMouseMove(e) {
                const diff = startY - e.clientY;
                const rotation = Math.max(maxOpen, Math.min(0, -diff * 1.5));
                flap.style.transform = `rotateX(${rotation}deg) translateZ(8px)`;
                currentRotation = rotation;
                
                if (rotation < -85) {
                    letter.classList.add('revealed');
                    seal.classList.add('hidden');
                } else {
                    letter.classList.remove('revealed');
                    seal.classList.remove('hidden');
                }
                
                if (Math.random() > 0.7) {
                    createSparkle(e.clientX, e.clientY);
                }
            }
            
            function onMouseUp() {
                flap.style.transition = 'transform 0.9s cubic-bezier(0.34, 1.56, 0.64, 1)';
                document.removeEventListener('mousemove', onMouseMove);
                document.removeEventListener('mouseup', onMouseUp);
                
                if (currentRotation < -65) {
                    openFlap();
                } else {
                    closeFlap();
                }
                currentRotation = 0;
            }
            
            // Click on letter to navigate
            letter.addEventListener('click', (e) => {
                if (flapOpen && letter.classList.contains('revealed')) {
                    // Sparkle explosion
                    for (let i = 0; i < 20; i++) {
                        setTimeout(() => {
                            createSparkle(
                                e.clientX + (Math.random() - 0.5) * 300,
                                e.clientY + (Math.random() - 0.5) * 300
                            );
                        }, i * 30);
                    }
                    
                    // Fade out and navigate
                    setTimeout(() => {
                        document.body.style.transition = 'opacity 1.5s ease';
                        document.body.style.opacity = '0';
                        setTimeout(() => {
                            window.location.href = 'https://keyatechmgc-ai.github.io/invite/main.html';
                        }, 1500);
                    }, 500);
                }
            });
        }

        // ============ INITIALIZATION ============
        function init() {
            initAIParticles();
            initGoldenParticles();
            initEnvelopeInteraction();
            
            // Initial sparkle show
            setTimeout(() => {
                const stage = document.getElementById('envelopeStage');
                const rect = stage.getBoundingClientRect();
                for (let i = 0; i < 8; i++) {
                    setTimeout(() => {
                        createSparkle(
                            rect.left + Math.random() * rect.width,
                            rect.top + Math.random() * rect.height
                        );
                    }, i * 150);
                }
            }, 1000);
            
            console.log('%c✨ Royal Envelope System Active ✨', 'font-size:18px;color:#c9a87c;');
            console.log('%c👑 AI-Powered Interactive Experience', 'color:#e8a0b4;');
        }

        init();
    </script>
